grid_size: 20.0

dt: 0.001
physics_steps_per_frame: 10

particle_count: 50
particle_radius: 3.0
random_seed: 42

lj_enabled: true
lj_epsilon: 50.0
lj_sigma: 6.0
lj_cutoff: 15.0
lj_max_acceleration: 20000.0

window:
  width: 800
  height: 600
  title: Physics Simulation

background_color:
  r: 12
  g: 14
  b: 18

simulation_elements:
  compartments:
    - name: start_reservoir
      polygon:
        - {x: 100, y: 40}
        - {x: 180, y: 40}
        - {x: 180, y: 100}
        - {x: 180, y: 160}
        - {x: 180, y: 220}
        - {x: 100, y: 220}
    - name: top_channel
      polygon:
        - {x: 180, y: 100}
        - {x: 560, y: 100}
        - {x: 500, y: 160}
        - {x: 180, y: 160}
    - name: right_channel
      polygon:
        - {x: 560, y: 100}
        - {x: 560, y: 360}
        - {x: 500, y: 300}
        - {x: 500, y: 160}
    - name: middle_channel
      polygon:
        - {x: 560, y: 360}
        - {x: 360, y: 360}
        - {x: 300, y: 300}
        - {x: 500, y: 300}
    - name: central_channel
      polygon:
        - {x: 360, y: 360}
        - {x: 360, y: 460}
        - {x: 300, y: 460}
        - {x: 300, y: 300}
    - name: end_reservoir
      polygon:
        - {x: 360, y: 460}
        - {x: 420, y: 460}
        - {x: 420, y: 640}
        - {x: 240, y: 640}
        - {x: 240, y: 460}
        - {x: 300, y: 460}

  zones:
    - type: spawn
      compartment: start_reservoir
    - type: target
      compartment: end_reservoir

  obstacles: []
  radial_fields: []

  segment_fields:
    - start: {x: 560, y: 100}
      end: {x: 560, y: 160}
      intensity: -1500.0
      optimize: true
      bounds: [-8000.0, -500.0]

    - start: {x: 500, y: 360}
      end: {x: 560, y: 360}
      intensity: -3000.0
      optimize: true
      bounds: [-8000.0, -500.0]

    - start: {x: 300, y: 300}
      end: {x: 300, y: 360}
      intensity: -5000.0
      optimize: true
      bounds: [-8000.0, -500.0]

    - start: {x: 240, y: 640}
      end: {x: 420, y: 640}
      intensity: -7500.0
      optimize: true
      bounds: [-10000.0, -1000.0]

    - start: {x: 100, y: 40}
      end: {x: 180, y: 40}
      intensity: 3000.0

    - start: {x: 100, y: 220}
      end: {x: 180, y: 220}
      intensity: 3000.0
