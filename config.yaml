# Configuration file for the physical simulation

# Grid settings
grid_size: 20.0  # Distance between grid lines (in virtual pixels)

# Simulation Timing settings
dt: 0.01  # Fixed time step for physics (in seconds)
physics_steps_per_frame: 1  # How many physics updates to perform per render frame

# Particle settings
particle_count: 50  # Number of ideal gas particles
particle_radius: 3.0  # Radius of each particle (for drawing and collision)

# Window settings
window:
  width: 1000
  height: 920
  title: "Physics Simulation (Custom Boundary Shape)"

# Background color (RGB, values 0-255)
background_color:
  r: 15
  g: 23
  b: 42

# Physical boundary elements
simulation_elements:
  # Compartments defining the segments of the corridor
  compartments:
    - name: "start_reservoir"
      polygon:
        - {x: 100, y: 60}
        - {x: 280, y: 60}
        - {x: 280, y: 140}
        - {x: 280, y: 240}
        - {x: 280, y: 320}
        - {x: 100, y: 320}
    - name: "top_channel"
      polygon:
        - {x: 280, y: 140}
        - {x: 700, y: 140}
        - {x: 700, y: 240}
        - {x: 280, y: 240}
    - name: "right_channel"
      polygon:
        - {x: 700, y: 140}
        - {x: 800, y: 140}
        - {x: 800, y: 480}
        - {x: 700, y: 480}
        - {x: 700, y: 380}
        - {x: 700, y: 240}
    - name: "middle_channel"
      polygon:
        - {x: 460, y: 380}
        - {x: 700, y: 380}
        - {x: 700, y: 480}
        - {x: 460, y: 480}
    - name: "central_channel"
      polygon:
        - {x: 360, y: 380}
        - {x: 460, y: 380}
        - {x: 460, y: 480}
        - {x: 460, y: 620}
        - {x: 360, y: 620}
    - name: "end_reservoir"
      polygon:
        - {x: 200, y: 620}
        - {x: 360, y: 620}
        - {x: 460, y: 620}
        - {x: 620, y: 620}
        - {x: 620, y: 840}
        - {x: 200, y: 840}

  # Logical zones in the simulation
  zones:
    - type: "spawn"
      compartment: "start_reservoir"
    - type: "target"
      compartment: "end_reservoir"

  # Internal obstacles (independent wall segments that particles must avoid)
  obstacles: []
